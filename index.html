<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Photobooth Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📸 Studio Photobooth</h1>
      <p>Studio foto pribadi dengan 10 tema dekorasi frame melimpah & variasi layout lengkap!</p>
    </header>

    <div class="main-content">
      <!-- Area Kamera & Kontrol -->
      <div class="camera-box">
        <div class="control-panel">
          <div class="control-group">
            <label for="layout-select">📐 Tata Letak Foto:</label>
            <select id="layout-select">
              <option value="1x1">1x1 (1 Foto Square)</option>
              <option value="2x1">2x1 (2 Foto Vertikal)</option>
              <option value="3x1">3x1 (3 Foto Classic Strip)</option>
              <option value="2x2">2x2 (4 Foto Grid)</option>
              <option value="2x3">2x3 (6 Foto Grid)</option>
            </select>
          </div>

          <div class="control-group">
            <label for="frame-style-select">🌹 Dekorasi Frame (10 Tema):</label>
            <select id="frame-style-select">
              <option value="rose_romantic">1. Red Roses & Hearts (3D Large)</option>
              <option value="gold_glitter">2. Golden Party & Stars</option>
              <option value="cute_birthday">3. Pastel Birthday Party</option>
              <option value="cute_cats">4. Cute Cat & Paws 🐱</option>
              <option value="coquette_ribbon">5. Love & Coquette 🎀</option>
              <option value="y2k_cyber">6. Y2K Cyber & Stars 👾</option>

              <option value="flower_garden">7. Flower Garden 🌸</option>
              <option value="ocean_splash">8. Ocean Splash 🌊</option>
              <option value="sweet_dessert">9. Sweet Dessert & Candy 🍩</option>
              <option value="space_galaxy">10. Space Adventure 🚀</option>
            </select>
          </div>

          <div class="control-group full-width">
            <label for="filter-select">✨ Filter Foto:</label>
            <div class="control-group full-width">
            <label for="filter-select">✨ Filter Foto ala Instagram (20+ Pilihan):</label>
            <select id="filter-select">
              <!-- Preset ala Instagram & Color Grading Modern -->
              <option value="none">Normal (Original)</option>
              <option value="brightness(125%) contrast(120%) saturate(135%)">Clarendon (Bright & Pop)</option>
              <option value="brightness(115%) contrast(90%) saturate(120%) hue-rotate(-10deg)">Lark (Soft Warm Glow)</option>
              <option value="sepia(35%) contrast(85%) brightness(115%) saturate(75%)">Reyes (Vintage Soft)</option>
              <option value="contrast(130%) brightness(110%) saturate(140%) sepia(15%)">Juno (Warm Vibrant)</option>
              <option value="contrast(85%) brightness(105%) saturate(85%) hue-rotate(10deg)">Slumber (Muted Retro)</option>
              <option value="contrast(90%) brightness(110%) saturate(90%) sepia(20%)">Crema (Smooth & Soft)</option>
              <option value="contrast(125%) brightness(105%) saturate(95%)">Ludwig (Clean Warm)</option>
              <option value="hue-rotate(-20deg) contrast(90%) brightness(115%) saturate(85%)">Aden (Pastel Soft)</option>
              <option value="contrast(110%) brightness(105%) saturate(110%)">Perpetua (Fresh Natural)</option>
              <option value="brightness(105%) contrast(90%) saturate(85%)">Gingham (Soft Aesthetic)</option>
              <option value="grayscale(100%) contrast(140%) brightness(95%)">Inkwell (B&W High Contrast)</option>
              <option value="grayscale(100%) contrast(90%) brightness(110%)">Moon (Soft B&W)</option>
              <option value="sepia(90%) contrast(110%) brightness(95%)">Valencia (Classic Sepia)</option>
              <option value="sepia(40%) saturate(160%) contrast(110%)">Warm Summer (Golden Glow)</option>
              <option value="hue-rotate(180deg) saturate(130%) contrast(110%)">Cool Dramatic (Teal Vibes)</option>
              <option value="contrast(180%) saturate(140%)">High Contrast (Bold Pop)</option>
              <option value="blur(0.6px) brightness(115%) contrast(105%)">Soft Dreamy (Glow Blur)</option>
              <option value="grayscale(30%) contrast(85%) brightness(115%) sepia(15%)">Faded Vintage (Film Roll)</option>
              <option value="invert(100%)">Invert / X-Ray</option>
            </select>
          </div>
        </div>

        <div class="video-wrapper">
          <video id="webcam" autoplay playsinline></video>
          <div id="countdown" class="hidden">3</div>
        </div>

        <button id="start-btn">Mulai Foto</button>
      </div>

      <!-- Area Preview Hasil Photobooth -->
      <div class="result-box">
        <h3>Hasil Photo Frame</h3>
        <canvas id="strip-canvas"></canvas>
        <button id="download-btn" disabled>Download Foto</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
